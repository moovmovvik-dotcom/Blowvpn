<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F5F5F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BlowVPN">
    
    <title>BlowVPN - Happ Plus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #F5F5F7;
            color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: #F5F5F7;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #E5E5EA;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            flex: 1;
            margin-left: 20px;
        }

        .header-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .header-btn:active {
            background-color: #E5E5EA;
        }

        /* Scroll Content */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* VPN Info Card */
        .vpn-card {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #E5E5EA;
        }

        .vpn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #E5E5EA;
        }

        .vpn-row:last-child {
            border-bottom: none;
        }

        .vpn-label {
            font-size: 16px;
            color: #000;
            font-weight: 500;
        }

        .vpn-value {
            font-size: 16px;
            color: #999;
            text-align: right;
        }

        /* Info Text */
        .info-text {
            font-size: 13px;
            color: #999;
            margin: 20px 0;
            padding: 0 4px;
            line-height: 1.5;
        }

        /* Toggle Section */
        .toggle-section {
            background-color: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #E5E5EA;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-label {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .toggle-title {
            font-size: 16px;
            font-weight: 500;
            color: #000;
        }

        .toggle-sub {
            font-size: 13px;
            color: #999;
        }

        /* Toggle Switch */
        .toggle {
            width: 50px;
            height: 30px;
            background-color: #E5E5EA;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s;
            border: none;
            padding: 0;
        }

        .toggle.active {
            background-color: #34C759;
        }

        .toggle-circle {
            width: 26px;
            height: 26px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle.active .toggle-circle {
            left: 22px;
        }

        /* Delete Button */
        .delete-btn {
            width: 100%;
            padding: 16px;
            background-color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #FF3B30;
            cursor: pointer;
            transition: background-color 0.2s;
            border: 1px solid #E5E5EA;
            margin-bottom: 40px;
        }

        .delete-btn:active {
            background-color: #FFF5F5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 300;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 90%;
            text-align: center;
            animation: scaleUp 0.3s ease;
        }

        @keyframes scaleUp {
            from { transform: scale(0.9); }
            to { transform: scale(1); }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #000;
        }

        .modal-message {
            font-size: 16px;
            color: #999;
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.cancel {
            background-color: #E5E5EA;
            color: #000;
        }

        .modal-btn.delete {
            background-color: #FF3B30;
            color: white;
        }

        .modal-btn:active {
            opacity: 0.7;
        }

        /* Edit Form */
        .edit-section {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #E5E5EA;
            margin-bottom: 24px;
            display: none;
        }

        .edit-section.show {
            display: block;
        }

        .input-wrapper {
            padding: 12px 16px;
            border-bottom: 1px solid #E5E5EA;
        }

        .input-wrapper:last-child {
            border-bottom: none;
        }

        .input-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            border: none;
            background-color: white;
            font-size: 16px;
            font-family: inherit;
            color: #000;
            padding: 4px 0;
        }

        .input-field::placeholder {
            color: #C7C7CC;
        }

        .input-field:focus {
            outline: none;
        }

        /* Edit Buttons */
        .edit-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .edit-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background-color: white;
            border: 1px solid #E5E5EA;
            color: #000;
        }

        .edit-btn.save {
            background-color: #007AFF;
            color: white;
            border: none;
        }

        .edit-btn:active {
            opacity: 0.7;
        }

        /* Success Message */
        .success-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background-color: #34C759;
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            animation: slideUp 0.3s ease, slideDown 0.3s ease 2.7s;
            z-index: 400;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideUp {
            from { transform: translateY(200%); }
            to { transform: translateY(0); }
        }

        @keyframes slideDown {
            from { transform: translateY(0); }
            to { transform: translateY(200%); }
        }

        /* iOS Safe Area */
        @supports (padding: max(0px)) {
            .scroll-content {
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
            .header {
                padding-top: max(16px, env(safe-area-inset-top));
            }
        }

        .edit-link {
            color: #007AFF;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="header-btn" onclick="goBack()">‹</button>
            <div class="header-title">Happ Plus</div>
            <button class="header-btn" onclick="shareVPN()">↗</button>
        </div>

        <!-- Content -->
        <div class="scroll-content">
            <!-- VPN Info Card -->
            <div class="vpn-card">
                <div class="vpn-row">
                    <span class="vpn-label">Тип</span>
                    <span class="vpn-value" id="displayType">Happ Plus</span>
                </div>
                <div class="vpn-row">
                    <span class="vpn-label">Сервер</span>
                    <span class="vpn-value" id="displayServer">Happ Plus</span>
                </div>
                <div class="vpn-row">
                    <span class="vpn-label">Адрес сервера</span>
                    <span class="vpn-value" id="displayServerAddr">254.1.1.1</span>
                </div>
                <div class="vpn-row">
                    <span class="vpn-label">Адрес</span>
                    <span class="vpn-value" id="displayAddr">198.18.0.1</span>
                </div>
                <div class="vpn-row">
                    <span class="vpn-label">Время подключения</span>
                    <span class="vpn-value" id="displayConnectTime">6:34</span>
                </div>
            </div>

            <!-- Info Text -->
            <p class="info-text">
                Для настройки параметров «Happ Plus» используйте приложение «Happ Plus».
            </p>

            <!-- Toggle Section -->
            <div class="toggle-section">
                <div class="toggle-label">
                    <span class="toggle-title">Подкл. по запросу</span>
                </div>
                <button class="toggle" id="autoConnectToggle" onclick="toggleAutoConnect()">
                    <div class="toggle-circle"></div>
                </button>
            </div>

            <!-- Edit Section -->
            <div class="edit-section" id="editSection">
                <div class="input-wrapper">
                    <label class="input-label">Тип</label>
                    <input type="text" class="input-field" id="editType" placeholder="Happ Plus">
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Сервер</label>
                    <input type="text" class="input-field" id="editServer" placeholder="Happ Plus">
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Адрес сервера</label>
                    <input type="text" class="input-field" id="editServerAddr" placeholder="254.1.1.1">
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Адрес</label>
                    <input type="text" class="input-field" id="editAddr" placeholder="198.18.0.1">
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Время подключения</label>
                    <input type="text" class="input-field" id="editConnectTime" placeholder="6:34">
                </div>
            </div>

            <!-- Edit Buttons -->
            <div class="edit-buttons" id="editButtons" style="display: none;">
                <button class="edit-btn" onclick="cancelEdit()">Cancel</button>
                <button class="edit-btn save" onclick="saveEdit()">Save</button>
            </div>

            <!-- Delete Button -->
            <button class="delete-btn" onclick="openDeleteModal()">Удалить VPN</button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-title">Удалить VPN?</div>
            <div class="modal-message">Конфигурация «Happ Plus» будет удалена</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="modal-btn delete" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage">
        ✓ VPN сохранена успешно
    </div>

    <script>
        let vpnConfig = {
            type: 'Happ Plus',
            server: 'Happ Plus',
            serverAddr: '254.1.1.1',
            addr: '198.18.0.1',
            connectTime: '6:34',
            autoConnect: true
        };

        // Load configuration
        function loadConfig() {
            const saved = localStorage.getItem('happ_plus_config');
            if (saved) {
                vpnConfig = JSON.parse(saved);
            }
            updateDisplay();
            updateToggle();
        }

        // Update display
        function updateDisplay() {
            document.getElementById('displayType').textContent = vpnConfig.type;
            document.getElementById('displayServer').textContent = vpnConfig.server;
            document.getElementById('displayServerAddr').textContent = vpnConfig.serverAddr;
            document.getElementById('displayAddr').textContent = vpnConfig.addr;
            document.getElementById('displayConnectTime').textContent = vpnConfig.connectTime;
        }

        // Update toggle
        function updateToggle() {
            const toggle = document.getElementById('autoConnectToggle');
            if (vpnConfig.autoConnect) {
                toggle.classList.add('active');
            } else {
                toggle.classList.remove('active');
            }
        }

        // Toggle auto connect
        function toggleAutoConnect() {
            vpnConfig.autoConnect = !vpnConfig.autoConnect;
            updateToggle();
            saveConfig();
        }

        // Edit functions
        function editConfig() {
            document.getElementById('editType').value = vpnConfig.type;
            document.getElementById('editServer').value = vpnConfig.server;
            document.getElementById('editServerAddr').value = vpnConfig.serverAddr;
            document.getElementById('editAddr').value = vpnConfig.addr;
            document.getElementById('editConnectTime').value = vpnConfig.connectTime;
            
            document.getElementById('editSection').classList.add('show');
            document.getElementById('editButtons').style.display = 'flex';
        }

        function cancelEdit() {
            document.getElementById('editSection').classList.remove('show');
            document.getElementById('editButtons').style.display = 'none';
        }

        function saveEdit() {
            vpnConfig.type = document.getElementById('editType').value || 'Happ Plus';
            vpnConfig.server = document.getElementById('editServer').value || 'Happ Plus';
            vpnConfig.serverAddr = document.getElementById('editServerAddr').value || '254.1.1.1';
            vpnConfig.addr = document.getElementById('editAddr').value || '198.18.0.1';
            vpnConfig.connectTime = document.getElementById('editConnectTime').value || '6:34';

            saveConfig();
            updateDisplay();
            cancelEdit();
            showSuccess();
        }

        // Save config
        function saveConfig() {
            localStorage.setItem('happ_plus_config', JSON.stringify(vpnConfig));
        }

        // Delete functions
        function openDeleteModal() {
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
        }

        function confirmDelete() {
            localStorage.removeItem('happ_plus_config');
            closeDeleteModal();
            goBack();
        }

        // Navigation
        function goBack() {
            window.history.back();
        }

        function shareVPN() {
            if (navigator.share) {
                navigator.share({
                    title: 'BlowVPN - Happ Plus',
                    text: `VPN Configuration: ${vpnConfig.type}`,
                    url: window.location.href
                });
            } else {
                alert('Share is not supported on this device');
            }
        }

        // Success message
        function showSuccess() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => {
                msg.classList.remove('show');
            }, 3000);
        }

        // Close modal on backdrop click
        document.getElementById('deleteModal').addEventListener('click', (e) => {
            if (e.target.id === 'deleteModal') {
                closeDeleteModal();
            }
        });

        // Add edit link to display
        window.addEventListener('load', () => {
            // Make VPN card clickable to edit
            document.querySelector('.vpn-card').addEventListener('click', editConfig);
            document.querySelector('.vpn-card').style.cursor = 'pointer';
        });

        // Initialize
        loadConfig();
    </script>
</body>
</html>
